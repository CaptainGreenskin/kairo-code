name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend — build + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kairo-code-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kairo-code-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Run vitest
        run: npm test -- --run

  backend:
    name: Backend — mvn verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean verify -pl kairo-code-server -am --no-transfer-progress
        env:
          KAIRO_WORKING_DIR: /tmp/kairo-ci-test
