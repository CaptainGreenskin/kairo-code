name: E2E

# Catches the bug classes that unit tests miss — surefire fork deadlocks
# (M-A6), CLI hangs on missing flags, ACP server stdin block, plugin
# command wiring regressions, etc. Runs against a real jar + real REPL
# session driven via stdin to ensure the CLI actually boots end-to-end.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Manual trigger for debugging
  workflow_dispatch:

jobs:
  cli-e2e:
    name: CLI E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build CLI jar
        run: mvn package -DskipTests -Dmaven.test.skip=true -pl kairo-code-cli -am --no-transfer-progress

      # Health checks that don't require a model. These caught real regressions
      # in this milestone — surefire deadlock (M-A6), ACP server stdin hang,
      # missing api-key exit code drift.

      - name: --help exits cleanly
        run: |
          java -jar kairo-code-cli/target/kairo-code-cli-*-SNAPSHOT.jar --help
          test $? -eq 0

      - name: --acp-server in dryrun mode exits 0 (not stdin-blocked)
        run: |
          # Without dryrun this would hang reading JSON-RPC frames forever.
          # The dryrun guard added in M-A6 makes this terminate immediately.
          java -Dkairo.code.dryrun=true \
               -jar kairo-code-cli/target/kairo-code-cli-*-SNAPSHOT.jar \
               --acp-server --api-key dummy
          test $? -eq 0

      - name: REPL boots + handles :help / :exit
        run: |
          # Drive the REPL via stdin. We never make a model call (no api-key
          # use, no :task), so this exercises bootstrap + slash command
          # dispatch + clean shutdown without burning quota.
          mkdir -p /tmp/kairo-e2e
          OUTPUT=$(printf ':help\n:exit\n' | \
            java -Dkairo.code.dryrun=true \
                 -jar kairo-code-cli/target/kairo-code-cli-*-SNAPSHOT.jar \
                 --api-key dummy \
                 --no-notifications \
                 --working-dir /tmp/kairo-e2e \
                 2>&1)
          echo "$OUTPUT"
          # All 30 slash commands must be in :help output, otherwise wiring
          # regressed (this caught the SwarmCommand / TeamCommand / ExpertCommand
          # missing wiring before — M-A5).
          for cmd in help history clear compact ctx team model cost usage plan \
                     skill snapshot resume exit hook mcp memory learned stats \
                     metrics session swarm expert init doctor evolve plugin \
                     mcp-server cron lsp; do
            if ! echo "$OUTPUT" | grep -q ":$cmd"; then
              echo "::error::missing slash command :$cmd in :help output"
              exit 1
            fi
          done
          echo "All 30 slash commands wired."

      - name: Surefire suite stays unstuck (M-A6 regression guard)
        # Whole suite must complete inside a generous wall-clock budget — the
        # earlier parallel surefire deadlock blew past 2h. Cap to 8 min.
        timeout-minutes: 8
        run: |
          mvn test -pl kairo-code-cli -am --no-transfer-progress \
            -Dmaven.test.failure.ignore=false

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**/*.txt'
          retention-days: 7
