apiVersion: v1
kind: ConfigMap
metadata:
  name: kairo-code-config
data:
  # All four must move together when switching provider — ProviderRegistry
  # picks defaults if you leave any blank, but explicit is clearer for ops.
  # Known providers: openai / anthropic / glm / qianwen.
  KAIRO_PROVIDER: "glm"
  KAIRO_BASE_URL: "https://open.bigmodel.cn/api/coding/paas/v4"
  KAIRO_MODEL: "glm-5.1"
  # Session reaper TTL — sessions with no chat activity for this many minutes
  # get evicted by the background reaper. Default 60 min.
  KAIRO_CODE_SESSION_IDLE_TTL_MINUTES: "60"
  # Max concurrent sessions. Past this cap, createSession evicts the
  # least-recently-active idle session before accepting the new one
  # (LRU). Running sessions are never evicted — overflow is preferred
  # over killing in-flight tool calls. Default 64.
  KAIRO_CODE_SESSION_POOL_SIZE: "64"
