# Template only — do NOT commit a real key.
#
# Create the real secret out-of-band:
#   kubectl create secret generic kairo-code-secret \
#     --from-literal=KAIRO_CODE_API_KEY=sk-...
#
# Or seal it with kubeseal for GitOps:
#   echo -n "sk-..." | kubectl create secret generic kairo-code-secret \
#     --dry-run=client --from-file=KAIRO_CODE_API_KEY=/dev/stdin -o yaml \
#     | kubeseal --controller-name=sealed-secrets-controller -o yaml > sealed-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: kairo-code-secret
type: Opaque
stringData:
  KAIRO_CODE_API_KEY: "REPLACE_ME"
