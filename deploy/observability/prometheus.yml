global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Remote-write receiver enabled by command-line flag in compose.
# See https://prometheus.io/docs/operating/integrations/#remote-endpoints-and-storage

scrape_configs:
  # The OTel collector exports its own self-metrics.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # kairo-code-server's Spring Actuator endpoint. Adjust if you run the server
  # inside the compose network (then use container hostname).
  - job_name: kairo-code-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: kairo-code-server
