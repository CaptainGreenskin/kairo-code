apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      # Trace-to-metrics linking — clicking a span in Tempo lights up the
      # matching Prometheus series.
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - { key: service.name, value: service }

  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
