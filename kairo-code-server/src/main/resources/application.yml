server:
  port: 8080

# Inbound access control for the HTTP/WS surface. This server can fork an
# interactive shell and read/write arbitrary files, so it must not be exposed
# to a network unauthenticated. Defaults are fail-closed: auth is enabled, and
# with no token set only loopback callers are allowed through.
kairo-server:
  security:
    enabled: ${KAIRO_SERVER_AUTH_ENABLED:true}
    # Shared bearer token. Inject via env; never commit a real value.
    # When blank, all non-loopback requests are rejected.
    auth-token: ${KAIRO_SERVER_AUTH_TOKEN:}
    # Loopback (127.0.0.1/::1) bypasses the token so local dev keeps working.
    allow-loopback: ${KAIRO_SERVER_ALLOW_LOOPBACK:true}
    # CORS + WebSocket origin whitelist. Empty = same-origin only (no cross-origin).
    allowed-origins: ${KAIRO_SERVER_ALLOWED_ORIGINS:}
    rate-limit:
      enabled: ${KAIRO_SERVER_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${KAIRO_SERVER_RATE_LIMIT_RPM:240}
      burst: ${KAIRO_SERVER_RATE_LIMIT_BURST:60}
    # OAuth/SSO -- set enabled=true and configure a provider below to switch
    # from token-based auth to OAuth2 login. When disabled (default), the server
    # uses ApiAuthFilter with shared bearer tokens.
    oauth:
      enabled: ${KAIRO_SERVER_OAUTH_ENABLED:false}
  auth:
    invite-code: ${KAIRO_SERVER_INVITE_CODE:}
    jwt-secret: ${KAIRO_JWT_SECRET:}
    token-expiry-hours: ${KAIRO_JWT_EXPIRY_HOURS:24}

