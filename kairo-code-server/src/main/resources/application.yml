kairo:
  # kairo-spring-boot-starter-core auto-config: must match kairo.code.* settings
  model:
    provider: ${KAIRO_PROVIDER:openai}
    api-key: ${KAIRO_CODE_API_KEY:placeholder}
    base-url: ${KAIRO_BASE_URL:https://api.openai.com}
    model-name: ${KAIRO_MODEL:gpt-4o}
  agent:
    continuation:
      enabled: true
      max-nudges: 3
      max-length-retries: 3
      tool-activity-lookback: 3
      min-tool-calls: 2
  evolution:
    enabled: true
    skill-enabled: true
    memory-enabled: true
    auto-apply: false
    iteration-threshold: 8
    review-timeout-seconds: 120
    governance:
      quarantine: true
      scan-required: true
    curator:
      enabled: true
      auto-start: true
      review-interval-minutes: 60
      stale-after-days: 30
      archive-after-days: 90

  code:
    # Leave model/provider/base-url empty when no env var is set so the resolve
    # chain in ServerConfig (env > ~/.kairo-code/config.properties > built-in default)
    # actually sees "user didn't set this" and falls through to the config file.
    # Filling in inline defaults here would make Spring hand ServerConfig a non-empty
    # @Value, masking whatever the user wrote in config.properties.
    working-dir: ${KAIRO_WORKING_DIR:${user.home}/kairo-workspace}
    api-key: ${KAIRO_CODE_API_KEY:}
    model: ${KAIRO_MODEL:}
    provider: ${KAIRO_PROVIDER:}
    base-url: ${KAIRO_BASE_URL:}
    # thinking-budget: ${KAIRO_THINKING_BUDGET:0}   # 0 = disabled; 8000+ for claude-3.7+

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  # Spring AI's ChatClient observation layer publishes gen_ai.* attrs that Langfuse maps
  # to input/output/usage automatically — only useful when an OTel SDK is active.
  observations:
    enable:
      spring:
        ai: true

# Langfuse OTLP exporter — see LangfuseConfig.
# All values come from env with NO inline defaults: credentials must never be
# committed. When host/keys are absent, set enabled=false (or leave LANGFUSE_ENABLED
# unset) so the exporter stays off rather than shipping with baked-in secrets.
langfuse:
  enabled: ${LANGFUSE_ENABLED:false}
  host: ${LANGFUSE_HOST:}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  secret-key: ${LANGFUSE_SECRET_KEY:}
